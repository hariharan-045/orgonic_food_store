{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center my-5">
  <div class="card border-0 shadow-lg rounded-4 p-4" style="width:100%;max-width:580px">

    <h3 class="fw-bold text-success mb-4"><i class="bi bi-plus-circle"></i> Add New Product</h3>

    <form method="POST" action="{{ url_for('add_product_route') }}">

      <div class="mb-3">
        <label class="form-label fw-semibold">Product Name</label>
        <input type="text" name="name" class="form-control rounded-3" placeholder="e.g. Organic Honey" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Category</label>
        <select name="category" class="form-select rounded-3" required>
          <option value="">Select Category</option>
          <option value="vegetables">Vegetables</option>
          <option value="rice">Rice</option>
          <option value="honey">Honey</option>
          <option value="oils">Oils</option>
          <option value="dryfruits">Dry Fruits</option>
          <option value="spices">Spices</option>
          <option value="millets">Millets</option>
          <option value="snacks">Snacks</option>
          <option value="juice">Juice</option>
          <option value="herbal">Herbal</option>
          <option value="fruits">Fruits</option>
        </select>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label fw-semibold">Price (₹)</label>
          <input type="number" name="price" class="form-control rounded-3" placeholder="e.g. 150" min="1" required>
        </div>
        <div class="col-6">
          <label class="form-label fw-semibold">Quantity</label>
          <input type="number" name="quantity" class="form-control rounded-3" placeholder="e.g. 100" min="1" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Product Description</label>
        <textarea name="description" class="form-control rounded-3" rows="2"
                  placeholder="Brief description of the product"></textarea>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Product Image URL</label>
        <input type="url" name="image" class="form-control rounded-3"
               placeholder="https://example.com/image.jpg">
        <div class="form-text">Paste a direct image link (from Wikipedia, Unsplash, etc.)</div>
      </div>

      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold">
          <i class="bi bi-plus-circle"></i> Add Product
        </button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
