{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height:75vh">
  <div class="card border-0 shadow-lg p-4 rounded-4" style="width:100%;max-width:430px">

    <div class="text-center mb-4">
      <div style="font-size:3rem">🌿</div>
      <h2 class="fw-bold text-success mt-2">Welcome Back</h2>
      <p class="text-muted small">Login to your account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" name="email" class="form-control rounded-3" placeholder="you@example.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control rounded-3" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold fs-5">
        Login →
      </button>

    </form>

    <p class="text-center mt-4 text-muted">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="text-success fw-semibold text-decoration-none">Register here</a>
    </p>

  </div>
</div>

{% endblock %}
