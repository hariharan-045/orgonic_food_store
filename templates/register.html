{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh">
  <div class="card border-0 shadow-lg p-4 rounded-4" style="width:100%;max-width:450px">

    <div class="text-center mb-4">
      <div style="font-size:3rem">🌿</div>
      <h2 class="fw-bold text-success mt-2">Create Account</h2>
      <p class="text-muted small">Join our organic community</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">

      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" name="name" class="form-control rounded-3" placeholder="Your full name" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" name="email" class="form-control rounded-3" placeholder="you@example.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control rounded-3" placeholder="Create a password" required>
      </div>

      <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold fs-5">
        Register →
      </button>

    </form>

    <p class="text-center mt-4 text-muted">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-success fw-semibold text-decoration-none">Login here</a>
    </p>

  </div>
</div>

{% endblock %}
