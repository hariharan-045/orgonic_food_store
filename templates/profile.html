{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center my-5">
  <div class="col-md-6">
    <div class="card border-0 shadow-lg rounded-4 p-4 text-center">
      <div style="font-size:5rem">👤</div>
      <h3 class="fw-bold mt-3 text-success">{{ user }}</h3>
      <p class="text-muted">{{ email }}</p>
      <hr>
      <div class="d-flex justify-content-center gap-3 mt-3">
        <a href="{{ url_for('products') }}" class="btn btn-success rounded-pill px-4">🛒 Shop Now</a>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger rounded-pill px-4">Logout</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
