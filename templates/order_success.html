{% extends "base.html" %}
{% block content %}

<div class="text-center py-5 my-5">
  <div style="font-size:6rem">✅</div>
  <h1 class="fw-bold text-success mt-3">Order Placed Successfully!</h1>
  <p class="text-muted fs-5 mt-2">Thank you for shopping with us. Your order is confirmed.</p>
  <p class="text-muted">Our team will contact you shortly for delivery.</p>

  <div class="d-flex justify-content-center gap-3 mt-4">
    <a href="{{ url_for('products') }}" class="btn btn-success btn-lg rounded-pill px-5">
      🛒 Continue Shopping
    </a>
    <a href="{{ url_for('home') }}" class="btn btn-outline-success btn-lg rounded-pill px-5">
      🏠 Go Home
    </a>

</div>

{% endblock %}
